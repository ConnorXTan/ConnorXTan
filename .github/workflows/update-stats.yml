name: update-stats

on:
  schedule:
    - cron: "7,22,37,52 * * * *" # every 15 min, off the :00 rush
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-stats
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Redraw contribution graph
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/contribution_graph.py

      - name: Fetch stats and rewrite README
        env:
          MONKEYTYPE_APEKEY: ${{ secrets.MONKEYTYPE_APEKEY }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
        run: python3 scripts/update_stats.py

      - name: Commit if changed
        run: |
          if git diff --quiet README.md; then
            echo "no changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "📊 refresh live stats"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            sleep 3
          done
